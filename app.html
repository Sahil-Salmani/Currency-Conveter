<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="app.css">
</head>

<body>
    <div class="currency-box ">
        <h2>CURRENCY CONVERTER</h2>
        <div class="dropdown-container">
            <div class= "from">
            <div class="dropdown">
                 <img src="https://flagsapi.com/US/flat/64.png" alt="">
                <select><option value="USD" selected>USD</option></select>
                </div>
            </div>
            <div class= "to">
             <div class="dropdown">
                <img src="https://flagsapi.com/IN/flat/64.png" alt="">
                <select><option value="INR" selected>INR</option>  </select>
                </div>
             </div>
             <input type="number" placeholder="Enter value"><br>
             <p> 95.62 </p>
             <button class="btn">Get Exchange Rate </button>
        </div>
        <script src="codes.js"></script>
<script src="app.js"></script>
</body>

</html>
